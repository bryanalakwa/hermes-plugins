name: hermes-dreaming
version: 2.0.0
description: >
  Idle-time memory consolidation and insight generation.
  Two-tier memory with holographic fact store + ChromaDB vector search.
  Dashboard tab at /dreams, cron-triggered dreaming every 30min.
hooks:
  - on_session_end
  - on_dashboard_init
config:
  idle_threshold_minutes:
    default: 30
    description: Minutes of inactivity before a dream can trigger
  max_dreams_per_day:
    default: 2
    description: Maximum dreams per calendar day
  cooldown_hours:
    default: 8
    description: Minimum hours between dreams
  memory_char_limit:
    default: 8000
    description: Max characters of memory to inject per session turn
  vector_collection:
    default: holographic_facts
    description: ChromaDB collection name for fact indexing
paths:
  dreams_dir: $HERMES_HOME/dreams
  state_file: $HERMES_HOME/dreams/state.json
  vector_store: $HERMES_HOME/chroma_db
  vector_script: $HERMES_AGENT/plugins/memory/holographic/vector_store.py
  holo_db: $HERMES_HOME/memory_store.db
dashboard:
  tab: /dreams
  position: after:achievements
  icon: Moon
dependencies:
  python:
    - chromadb>=1.0
  optional:
    - numpy>=2.0
