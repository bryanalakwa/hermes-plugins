name: hermes-dream-engine
version: 1.0.1
description: >
  Autonomous event-driven dreaming engine. State machine-based sleep detection
  with 5 states (Active → Idle → Dormant → Hypnagogic → Dreaming). Dream sessions
  run memory consolidation, problem re-evaluation, and free association.
  Dashboard tab at /dream-engine.
hooks:
  - pre_gateway_dispatch
  - pre_tool_call
  - on_dashboard_init
config:
  idle_threshold_seconds:
    default: 300
    description: T1 - seconds before Active -> Idle
  dormant_threshold_seconds:
    default: 1800
    description: T2 - seconds before Idle -> Dormant (cumulative from last heartbeat)
  soak_threshold_seconds:
    default: 3000
    description: T3 - seconds in Dormant before dream gate check
  hypnagogic_duration_seconds:
    default: 120
    description: T4 - seconds for hypnagogic prep phase
  max_dreams_per_day:
    default: 2
    description: Maximum dream sessions per calendar day (midnight reset)
  consolidation_memory_count:
    default: 150
    description: Number of recent memories to consolidate in Phase 1
  invention_sample_size:
    default: 10
    description: K - random memories to sample for cross-domain invention
paths:
  config: $HERMES_HOME/config.yaml
  state: $HERMES_HOME/dream_engine/state.json
  journal: $HERMES_HOME/dream_engine/journal.json
  memories_source: $HERMES_HOME/dreams/state.json
dependencies:
  python:
    - pyyaml>=6.0
  system:
    - python3>=3.7
dashboard:
  tab: /dream-engine
  position: after:achievements
  icon: Moon
